name: Daily market digest

on:
  schedule:
    # 07:07 UTC = 9:07 en Espana (CEST, UTC+2) en horario de verano.
    # GitHub Actions no ajusta el cron por horario de invierno/verano:
    # en horario de invierno (CET, UTC+1) esto se ejecutara a las 8:07.
    # Se evita el minuto en punto (":00") porque es cuando mas carga
    # global tiene GitHub Actions y mas se retrasan los cron.
    - cron: "7 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Publicar dashboard actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Actualiza dashboard diario"
          git push
